<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('BIN Ranges', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>Low</th><th>High</th><th>Issuer</th><th>Created</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="b : ${binRanges}">
                            <td><code th:text="${b.low}"></code></td>
                            <td><code th:text="${b.high}"></code></td>
                            <td th:text="${b.issuer.name}"></td>
                            <td th:text="${#temporals.format(b.createdAt, 'yyyy-MM-dd')}"></td>
                            <td>
                                <form th:action="@{'/api/bin-ranges/' + ${b.id}}" method="post"
                                      onsubmit="return confirm('Delete this BIN range?')">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(binRanges)}">
                            <td colspan="5" class="text-center text-muted py-4">No BIN ranges configured.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Add BIN Range</div>
                <div class="card-body">
                    <form th:action="@{/api/bin-ranges}" method="post">
                        <div class="mb-2">
                            <label class="form-label small">Low BIN</label>
                            <input type="text" name="low" class="form-control form-control-sm"
                                   placeholder="400000" required maxlength="19"/>
                        </div>
                        <div class="mb-2">
                            <label class="form-label small">High BIN</label>
                            <input type="text" name="high" class="form-control form-control-sm"
                                   placeholder="499999" required maxlength="19"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Issuer</label>
                            <select name="issuerId" class="form-select form-select-sm" required>
                                <option th:each="i : ${issuers}" th:value="${i.id}" th:text="${i.name}"></option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100">Add Range</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
