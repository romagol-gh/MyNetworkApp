<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Fraud Rules', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Name</th><th>Type</th><th>Parameters</th>
                    <th>Score</th><th>Action</th><th>Enabled</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${rules}">
                    <td th:text="${r.name}"></td>
                    <td><span class="badge bg-secondary" th:text="${r.ruleType}"></span></td>
                    <td><code class="small" th:text="${r.parameters}"></code></td>
                    <td th:text="${r.scoreWeight}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.action.name() == 'DECLINE' ? 'bg-danger' : 'bg-warning text-dark'}"
                              th:text="${r.action}"></span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.enabled ? 'bg-success' : 'bg-secondary'}"
                              th:text="${r.enabled ? 'ON' : 'OFF'}"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(rules)}">
                    <td colspan="6" class="text-center text-muted py-4">No rules configured.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="mt-3">
        <small class="text-muted">
            Rules are managed via the REST API: <code>PUT /api/fraud/rules/{id}</code>
            to adjust thresholds or enable/disable. Seed rules were created at startup.
        </small>
    </div>
</div>
</body>
</html>
