<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Participants', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between mb-3">
        <div></div>
        <a th:href="@{/participants/new}" class="btn btn-primary btn-sm">+ Add Participant</a>
    </div>

    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Name</th><th>Code</th><th>Type</th>
                    <th>Host</th><th>Port</th><th>Status</th><th>Created</th><th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${participants}">
                    <td th:text="${p.name}"></td>
                    <td><code th:text="${p.code}"></code></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.type.name() == 'ACQUIRER' ? 'bg-primary' : 'bg-success'}"
                              th:text="${p.type}"></span>
                    </td>
                    <td th:text="${p.host ?: '—'}"></td>
                    <td th:text="${p.port ?: '—'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.status.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}"
                              th:text="${p.status}"></span>
                    </td>
                    <td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <a th:href="@{'/participants/' + ${p.id} + '/edit'}"
                           class="btn btn-sm btn-outline-secondary">Edit</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(participants)}">
                    <td colspan="8" class="text-center text-muted py-4">No participants yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
