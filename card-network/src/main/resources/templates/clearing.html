<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Clearing', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="row g-4">
        <div class="col-md-9">
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>Date</th><th>Status</th><th>Records</th><th>Total Amount</th><th>Total Fees</th><th>Completed</th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="b : ${batches}">
                            <td th:text="${b.batchDate}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.status.name() == 'COMPLETE' ? 'bg-success' :
                                                       b.status.name() == 'FAILED' ? 'bg-danger' : 'bg-warning text-dark'}"
                                      th:text="${b.status}"></span>
                            </td>
                            <td th:text="${b.recordCount ?: 0}"></td>
                            <td th:text="'$' + #numbers.formatDecimal((b.totalAmount ?: 0) / 100.0, 1, 2)"></td>
                            <td th:text="'$' + #numbers.formatDecimal((b.totalFees ?: 0) / 100.0, 1, 2)"></td>
                            <td th:text="${b.completedAt != null ? #temporals.format(b.completedAt, 'HH:mm:ss') : '—'}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(batches)}">
                            <td colspan="6" class="text-center text-muted py-4">No clearing batches yet.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title">Manual Clearing</h6>
                    <p class="text-muted small">Run clearing + settlement for today's approved transactions.</p>
                    <form th:action="@{/clearing/run}" method="post">
                        <button class="btn btn-primary w-100" type="submit">Run Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
