<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Dashboard', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card primary">
                <div class="card-body">
                    <div class="text-muted small">Today's Transactions</div>
                    <div class="fs-3 fw-bold" th:text="${totalTransactions}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card success">
                <div class="card-body">
                    <div class="text-muted small">Approval Rate</div>
                    <div class="fs-3 fw-bold" th:text="${approvalRate} + '%'">0%</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card warning">
                <div class="card-body">
                    <div class="text-muted small">Volume (minor units)</div>
                    <div class="fs-3 fw-bold" th:text="${totalVolume}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card danger">
                <div class="card-body">
                    <div class="text-muted small">Pending Fraud Alerts</div>
                    <div class="fs-3 fw-bold" th:text="${pendingFraudAlerts}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title">Active TCP Sessions</h6>
                    <p class="fs-4 fw-bold mb-0" th:text="${activeSessions}">0</p>
                    <small class="text-muted">Acquirers &amp; Issuers connected on port 8583</small>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h6 class="card-title">Quick Links</h6>
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/transactions}" class="btn btn-sm btn-outline-primary">Transactions</a>
                        <a th:href="@{/fraud/alerts}" class="btn btn-sm btn-outline-danger">Fraud Alerts</a>
                        <a th:href="@{/clearing}" class="btn btn-sm btn-outline-secondary">Run Clearing</a>
                        <a th:href="@{/participants}" class="btn btn-sm btn-outline-dark">Participants</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
