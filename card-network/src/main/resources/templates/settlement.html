<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Settlement', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>Date</th><th>Participant</th><th>Type</th>
                    <th>Debit Total</th><th>Credit Total</th>
                    <th>Interchange Paid</th><th>Interchange Rcvd</th><th>Network Fees</th>
                    <th>Net Position</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${records}">
                    <td th:text="${r.settlementDate}"></td>
                    <td th:text="${r.participant.name}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${r.participant.type.name() == 'ACQUIRER' ? 'bg-primary' : 'bg-success'}"
                              th:text="${r.participant.type}"></span>
                    </td>
                    <td th:text="|$${#numbers.formatDecimal(r.debitTotal / 100.0, 1, 2)}|"></td>
                    <td th:text="|$${#numbers.formatDecimal(r.creditTotal / 100.0, 1, 2)}|"></td>
                    <td class="text-danger"
                        th:text="|$${#numbers.formatDecimal(r.interchangeFeesPaid / 100.0, 1, 2)}|"></td>
                    <td class="text-success"
                        th:text="|$${#numbers.formatDecimal(r.interchangeFeesReceived / 100.0, 1, 2)}|"></td>
                    <td class="text-danger"
                        th:text="|$${#numbers.formatDecimal(r.networkFeesPaid / 100.0, 1, 2)}|"></td>
                    <td>
                        <span th:classappend="${r.netPosition >= 0 ? 'text-success fw-bold' : 'text-danger fw-bold'}"
                              th:text="|$${#numbers.formatDecimal(r.netPosition / 100.0, 1, 2)}|"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(records)}">
                    <td colspan="9" class="text-center text-muted py-4">No settlement records yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
