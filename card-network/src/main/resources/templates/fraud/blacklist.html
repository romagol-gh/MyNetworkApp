<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('PAN Blacklist', ~{::content})}">
<body>
<div th:fragment="content">
    <div class="row g-4">
        <div class="col-md-8">
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr><th>PAN Hash (SHA-256)</th><th>Reason</th><th>Added</th><th>Expires</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="c : ${blacklist}">
                            <td><code class="small" th:text="${c.panHash}"></code></td>
                            <td th:text="${c.reason ?: '—'}"></td>
                            <td th:text="${#temporals.format(c.createdAt, 'yyyy-MM-dd')}"></td>
                            <td th:text="${c.expiresAt != null ? #temporals.format(c.expiresAt, 'yyyy-MM-dd') : 'Permanent'}"></td>
                            <td>
                                <form th:action="@{'/api/fraud/blacklist/' + ${c.id}}" method="post">
                                    <input type="hidden" name="_method" value="DELETE"/>
                                    <button class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Remove from blacklist?')">Remove</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(blacklist)}">
                            <td colspan="5" class="text-center text-muted py-4">No blacklisted cards.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card">
                <div class="card-header">Add PAN to Blacklist</div>
                <div class="card-body">
                    <p class="text-muted small">The raw PAN is hashed (SHA-256) server-side and never stored.</p>
                    <form th:action="@{/api/fraud/blacklist}" method="post">
                        <div class="mb-2">
                            <label class="form-label small">PAN</label>
                            <input type="text" name="pan" class="form-control form-control-sm"
                                   placeholder="4111111111111111" maxlength="19" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Reason</label>
                            <input type="text" name="reason" class="form-control form-control-sm"
                                   placeholder="Fraud reported"/>
                        </div>
                        <button type="submit" class="btn btn-danger btn-sm w-100">Blacklist Card</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
