<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Card Network — Sign In</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="card shadow" style="width:360px;">
    <div class="card-body p-4">
        <h5 class="card-title text-center mb-4 fw-bold">&#9632; Card Network</h5>

        <div th:if="${param.error}" class="alert alert-danger py-2">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2">You have been signed out.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
