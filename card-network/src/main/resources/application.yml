server:
  port: 8080

spring:
  application:
    name: card-network

  datasource:
    url: jdbc:postgresql://localhost:5432/cardnetwork
    username: card
    password: card
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  thymeleaf:
    cache: false

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin}

gateway:
  port: 8583
  connect-timeout: 5000
  response-timeout: 30000

clearing:
  cron: "0 0 23 * * *"

settlement:
  cron: "0 30 23 * * *"

logging:
  level:
    com.network: INFO
    org.jpos: WARN
    io.netty: WARN
